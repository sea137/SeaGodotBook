# 基础站点信息
title: SeaGodotBook
description: 系统、现代的 Godot 4 游戏开发教程，从零开始掌握游戏引擎。

# 使用 Just the Docs 远程主题（官方推荐方式）
remote_theme: just-the-docs/just-the-docs

# 网站 URL（GitHub Pages 会自动填充，可不写）
url: "https://sea137.github.io"

# 启用搜索
search_enabled: true
search.tokenizer_separator: /[\s/]+/

# 侧边栏导航启用
nav_enabled: true
heading_anchors: true

# 深色主题（可选 light）
color_scheme: dark

# 为外部链接添加图标
external_navigation_enabled: true

# Markdown 解析器与高亮
markdown: kramdown
highlighter: rouge

# 构建时排除的文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore