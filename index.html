<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>GDScript 零基础图文入门</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    /* 微调样式：让左侧边栏高亮颜色和整体框架更加契合 */
    .sidebar-nav li.active > a {
      color: #42b983 !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">正在加载文档，请稍候...</div>
  <script>
    window.$docsify = {
      name: 'GDScript 零基础图文入门', // 左上角显示的网站主标题
      loadSidebar: true,               // 开启侧边栏读取功能
      subMaxLevel: 3,                  // 自动提取文章内的 ## 和 ### 标题到侧边栏
      auto2top: true,                  // 切换页面时自动回到顶部
      // 搜索栏核心汉化配置
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '搜索类型 / 关键字', // 还原你图中的搜索框提示
        noData: '未找到相关结果！',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-gdscript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
</body>
</html>
