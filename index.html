<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>GDScript 零基础图文入门</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* 强制汉化并微调搜索框 */
    .search input::placeholder {
      color: #888 !important;
    }
    /* 侧边栏激活项高亮颜色 */
    .sidebar-nav li.active > a {
      color: #00bcd4 !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">正在加载中，请稍候...</div>
  <script>
    window.$docsify = {
      name: 'GDScript 零基础图文入门', 
      loadSidebar: true,               // 必须：开启侧边栏
      subMaxLevel: 3,                  
      auto2top: true,
      homepage: 'test/1.控制移动.md',  // 【核心修改】强制把第一篇文章当成网站主页，防止首页空白
      
      // 搜索栏完整中文配置
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索类型 / 关键字',
        noData: '没有找到相关结果',
        depth: 6
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-gdscript.min.js"></script>
</body>
</html>
