<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>GDScript 零基础图文入门</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* 强行汉化并微调搜索框内的提示文字颜色 */
    .search input::placeholder {
      color: #888 !important;
    }
    /* 侧边栏当前激活项的高亮颜色（极客青色） */
    .sidebar-nav li.active > a {
      color: #00bcd4 !important;
      font-weight: bold;
    }
    /* 优化侧边栏字体粗细，使其看起更有质感 */
    .sidebar {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app">正在加载中，请稍候...</div>

  <script>
    window.$docsify = {
      name: 'GDScript 零基础图文入门', // 网站左上角的大标题
      loadSidebar: true,               // 必须：开启自定义侧边栏功能
      subMaxLevel: 3,                  // 自动抓取文章内部的 ## 和 ### 标题生成小目录
      auto2top: true,                  // 切换页面时自动滚回顶部
      
      // 【核心安全锁】强行把你的第一篇教程设置成首页，防止首页白屏
      homepage: 'test/1.控制移动.md',  
      
      // 【路由兼容锁】开启相对路径，确保在 GitHub 二级域名下能顺畅找到本地文件
      relativePath: true,              

      // 完美的中文搜索栏配置
      search: {
        maxAge: 86400000,              // 缓存过期时间（毫秒）
        paths: 'auto',
        placeholder: '搜索类型 / 关键字', // 搜索框提示词
        noData: '没有找到相关结果',      // 找不到结果时的提示
        depth: 6                       // 搜索支持的标题深度
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-gdscript.min.js"></script>
</body>
</html>
